<div class="container">

    <div class="encabezado">
        <h1>Lista de productos</h1>
        <button routerLink="/add" type="button" class="btn btn-secondary">Agregar producto</button>
    </div>


    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Descripcion</th>
                <th scope="col">Precio</th>
                <th scope="col">Stock</th>
                <th scope="col"></th>
            </tr>
        </thead>
        <tbody>

            @for (item of productos; track $index) {
                <tr class="table-secondary">
                    <td> {{ item.name }} </td>
                    <td> {{ item.description }} </td>
                    <td> {{ item.price }} </td>
                    <td> {{ item.stock }} </td>
                    <td>  
                        <button routerLink="/edit/{{ item.id }}"  type="button" class="btn btn-secondary btn-sm" >Editar</button>
                        <button type="button" class="btn btn-danger btn-sm">Eliminar</button>
                    </td>

                </tr>
            }


        </tbody>
    </table>
</div>
